<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mock Interview – True Occupation</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- ═══ PWA START ═══ -->
  <link rel="manifest" href="/trueocc/manifest.json">
  <meta name="theme-color" content="#0A66C2">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TrueOcc">
  <link rel="apple-touch-icon" href="/trueocc/frontend/icons/icon-192x192.svg">
  <!-- ═══ PWA END ═══ -->
  <style>
    .interview-container { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
    @media (max-width: 768px) { .interview-container { grid-template-columns: 1fr; } }
    .camera-feed { width: 100%; height: 200px; background: #000; border-radius: 12px; position: relative; overflow: hidden; }
    #video, #preview-video { width: 100%; height: 100%; object-fit: cover; }
    #canvas-proctoring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: block; z-index: 2; }
    .camera-status { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; margin-top: 8px; }
    .camera-status.active { background: #E8F5E9; color: var(--success); }
    .camera-status.warning { background: #FFF3E0; color: #E65100; }
    .camera-status.error { background: #FFEBEE; color: var(--danger); }
    .proctoring-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .proctoring-item { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 13px; padding: 8px 10px; border-radius: 8px; background: var(--bg); }
    .proctoring-item.ok { background: #E8F5E9; color: var(--success); }
    .proctoring-item.warning { background: #FFF3E0; color: #E65100; }
    .proctoring-item.alert { background: #FFEBEE; color: var(--danger); animation: pulse 0.6s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .proctor-icon { font-size: 14px; }
    .ai-hr-chat { background: var(--bg); border-radius: 12px; padding: 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.6; }
    .ai-hr-chat strong { color: var(--primary); }
    .warning-msg { display: flex; align-items: center; gap: 8px; background: #FFF3E0; border-left: 4px solid #E65100; padding: 12px; border-radius: 4px; margin: 12px 0; font-size: 13px; }
    .warning-msg i { color: #E65100; }
    .readiness-grid { display: grid; gap: 12px; margin-bottom: 20px; }
    .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px; border-radius: var(--r-sm); border: 1px solid var(--border); background: var(--surface); font-size: 13px; }
    .check-item.done { border-color: var(--success); background: #E8F5E9; }
    .mic-meter-wrap { height: 10px; border-radius: 6px; background: var(--border); overflow: hidden; margin-top: 8px; }
    .mic-meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), #6A1B9A); transition: width 0.08s linear; }
    .toolbar-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    .ans-status { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
    .ans-status.answered { color: var(--success); }
    .ans-status.skipped { color: #E65100; }

  </style>
</head><body>
<div id="nav"></div>
<div class="container page">
  <div style="max-width:840px;margin:0 auto;" id="wrap"></div>
</div>
<div id="toasts"></div>
<script src="../js/main.js?v=2"></script>
<script>

let u = null, questions = [], answers = [], answerStatuses = [], currentQ = 0;
let recognition = null, synth = window.speechSynthesis;
let isRecording = false, attemptRole = '', jobId = null;
let videoStream = null, faceModelsLoaded = false, headTurnWarnings = 0;
let faceMesh = null, camera = null;
let headTrackGeneration = 0;
let faceModelsLoadingPromise = null;
let badPoseStreak = 0, goodPoseStreak = 0, faceMissingStreak = 0;
let liveYaw = 0, livePitch = 0;
let lastProctorUiMs = 0;
// Separate flags for each violation type — each updates independently
let faceDetectionState = {
  faceCount: -1,        // -1 = not yet detected
  headStraight: true,
  faceNotDetected: false,
  multipleFaces: false
};
let aiHRMessages = [], proctorStats = { camera: false, microphone: false, headStraight: true };
let interviewSessionId = null, tabSwitchCount = 0;
let micAudioCtx = null, micAnalyser = null, micRafId = null;
let voiceMuted = false, cameraUserDisabled = false;

let gateStatus = {};
let proctorSessionActive = false;

function resetProctorSession() {
  stopHeadTracking();
  proctorSessionActive = false;
}

async function init() {
  try {
    const d = await checkAuth('seeker');
    if (!d) return;
    u = d;
    document.getElementById('nav').innerHTML = buildNavbar(d.user, 'seeker');
    loadNotifs();
    const params = new URLSearchParams(window.location.search);
    jobId = params.get('job_id') ? parseInt(params.get('job_id'), 10) : null;
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden' && interviewSessionId && questions.length) tabSwitchCount++;
    });
    let status = { data: null };
    try {
      status = await API.get('interview.php', 'status');
    } catch (e) {
      console.error('[Interview] Could not fetch interview status:', e);
    }
    gateStatus = (status && status.data) ? status.data : { can_attempt: true, attempts: 0, free_limit: 1, is_premium: false };
    renderGate(gateStatus);
  } catch (e) {
    console.error('[Interview] init() failed:', e);
    const wrap = document.getElementById('wrap');
    if (wrap) {
      wrap.innerHTML = `
        <div class="card fade-in" style="text-align:center;padding:40px 20px;">
          <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
          <h2 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px;">Something went wrong</h2>
          <p style="color:var(--muted);margin-bottom:20px;">Could not load the interview page. Please check your connection and try again.</p>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="location.reload()"><i class="fas fa-redo"></i> Retry</button>
            <a href="user-dashboard.html" class="btn btn-ghost"><i class="fas fa-home"></i> Dashboard</a>
          </div>
          <details style="margin-top:20px;text-align:left;font-size:12px;color:var(--muted);">
            <summary style="cursor:pointer;">Error details</summary>
            <pre style="background:var(--bg);padding:8px;border-radius:4px;margin-top:4px;overflow:auto;">${e.message || e}</pre>
          </details>
        </div>`;
    }
  }
}

function renderGate(s) {
  const canAttempt = s.can_attempt;
  document.getElementById('wrap').innerHTML = `
    <div class="card fade-in">
      <div style="text-align:center;padding:20px 0 10px;">
        <div style="font-size:56px;margin-bottom:14px;">🎤</div>
        <h1 style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:8px;">AI Mock Interview</h1>
        <p style="color:var(--muted);margin-bottom:20px;">Camera · microphone · voice or type · <strong>Gemini AI</strong> feedback</p>
        <div class="g3" style="margin-bottom:24px;">
          <div style="background:var(--bg);border-radius:var(--r-sm);padding:16px;"><div style="font-size:24px;font-weight:800;font-family:'Syne',sans-serif;color:var(--primary);">5</div><div style="font-size:12px;color:var(--muted);">Questions</div></div>
          <div style="background:var(--bg);border-radius:var(--r-sm);padding:16px;"><div style="font-size:24px;font-weight:800;font-family:'Syne',sans-serif;color:var(--primary);">⏱</div><div style="font-size:12px;color:var(--muted);">Timer / status</div></div>
          <div style="background:var(--bg);border-radius:var(--r-sm);padding:16px;"><div style="font-size:24px;font-weight:800;font-family:'Syne',sans-serif;color:var(--primary);">📈</div><div style="font-size:12px;color:var(--muted);">Readiness</div></div>
        </div>
        <div class="fg" style="text-align:left;max-width:400px;margin:0 auto 20px;">
          <label class="label">Target Role <span style="font-weight:400;color:var(--muted);">(optional)</span></label>
          <input type="text" id="target-role" class="input" placeholder="e.g. Frontend Developer, Data Analyst...">
        </div>
        <div class="alert a-info" style="text-align:left;margin-bottom:24px;">
          <i class="fas fa-lightbulb" style="flex-shrink:0;"></i>
          <div>Use <strong>STAR</strong> (Situation → Task → Action → Result).<br>
          ${s.is_premium ? '✨ Premium: unlimited sessions.' : `Free: <strong>${s.attempts || 0}/${s.free_limit || 1}</strong> distinct session(s) used.`}
          ${jobId ? '<br>📌 <strong>Employer questions</strong> for this job when available.' : ''}</div>
        </div>
        ${!canAttempt ? `<div class="lock-box"><div style="font-size:48px;margin-bottom:12px;">🔒</div>
          <div style="font-size:22px;font-weight:700;margin-bottom:8px;">Upgrade to Premium</div>
          <p style="opacity:0.85;margin-bottom:20px;">Free session used. Unlimited AI mock interviews with Premium.</p>
          <button class="btn btn-lg" style="background:white;color:#764ba2;font-weight:700;" onclick="openPremiumScanner()"><i class="fas fa-crown"></i> Upgrade – ₹499/month</button>
        </div>` : `<button class="btn btn-grad btn-lg" onclick="openReadinessFlow()"><i class="fas fa-shield-alt"></i> Set up &amp; start</button>`}
      </div>
    </div>
    <div class="card" style="margin-top:24px;"><div class="card-header"><span class="card-title">📋 Previous answers</span></div><div id="prev"></div></div>`;
  loadPrev();
}

function openReadinessFlow() {
  attemptRole = document.getElementById('target-role')?.value.trim() || 'Software Engineer';
  interviewSessionId = null;
  
  // Show instruction page first
  document.getElementById('wrap').innerHTML = `
    <div class="card fade-in">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px;">
        <h2 style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin:0;">📋 Before You Start</h2>
        <button type="button" class="btn btn-ghost btn-sm" onclick="cancelReadiness()"><i class="fas fa-arrow-left"></i> Back</button>
      </div>
      <p style="color:var(--muted);font-size:14px;margin-bottom:20px;">Please follow these steps for the best interview experience:</p>
      
      <div class="readiness-grid">
        <div class="check-item" style="border:1px solid var(--border);background:var(--surface);"><i class="fas fa-video" style="margin-top:2px;color:var(--primary);font-size:18px;"></i><div><strong>Allow camera and microphone</strong><br><span style="color:var(--muted);font-size:13px;">Grant permissions when prompted in the next step</span></div></div>
        <div class="check-item" style="border:1px solid var(--border);background:var(--surface);"><i class="fas fa-lightbulb" style="margin-top:2px;color:#F57F17;font-size:18px;"></i><div><strong>Sit in a well-lit place</strong><br><span style="color:var(--muted);font-size:13px;">Face detection works best with natural or bright lighting</span></div></div>
        <div class="check-item" style="border:1px solid var(--border);background:var(--surface);"><i class="fas fa-face-smile" style="margin-top:2px;color:#2196F3;font-size:18px;"></i><div><strong>Keep your face clearly visible</strong><br><span style="color:var(--muted);font-size:13px;">Position your camera at eye level, about 60cm away</span></div></div>
        <div class="check-item" style="border:1px solid var(--border);background:var(--surface);"><i class="fas fa-volume-mute" style="margin-top:2px;color:#E65100;font-size:18px;"></i><div><strong>Avoid background noise</strong><br><span style="color:var(--muted);font-size:13px;">Choose a quiet environment for clear voice capture</span></div></div>
        <div class="check-item" style="border:1px solid var(--border);background:var(--surface);"><i class="fas fa-microphone" style="margin-top:2px;color:#6A1B9A;font-size:18px;"></i><div><strong>Speak clearly and naturally</strong><br><span style="color:var(--muted);font-size:13px;">Use the STAR method (Situation → Task → Action → Result)</span></div></div>
        <div class="check-item" style="border:1px solid var(--border);background:var(--surface);"><i class="fas fa-wifi" style="margin-top:2px;color:var(--success);font-size:18px;"></i><div><strong>Stable internet connection</strong><br><span style="color:var(--muted);font-size:13px;">Make sure your connection is stable throughout</span></div></div>
      </div>
      
      <div style="background:#E3F2FD;border:1px solid #BBDEFB;border-radius:8px;padding:16px;margin:20px 0;font-size:13px;">
        <i class="fas fa-info-circle" style="color:var(--primary);margin-right:8px;"></i>
        <strong>Ready?</strong> Click the button below to proceed to camera setup and then start your interview.
      </div>
      
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;">
        <button type="button" class="btn btn-grad btn-lg" onclick="proceedToSetup()"><i class="fas fa-play"></i> Continue to setup</button>
      </div>
    </div>`;
}

function proceedToSetup() {
  showReadinessSetup();
}

function showReadinessSetup() {
  document.getElementById('wrap').innerHTML = `
    <div class="card fade-in">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px;">
        <h2 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin:0;">📷 Camera & Mic Setup</h2>
        <button type="button" class="btn btn-ghost btn-sm" onclick="cancelReadiness()"><i class="fas fa-arrow-left"></i> Back</button>
      </div>
      <p style="color:var(--muted);font-size:14px;margin-bottom:16px;">Test your camera and microphone before starting</p>
      <div class="readiness-grid">
        <div class="check-item" id="chk-browser"><i class="fas fa-window-maximize" style="margin-top:2px;color:var(--primary);"></i><div><strong>Browser</strong><br><span style="color:var(--muted);font-size:12px;">Use a recent Chrome / Edge for best speech recognition.</span></div></div>
        <div class="check-item" id="chk-perm"><i class="fas fa-lock-open" style="margin-top:2px;color:var(--primary);"></i><div><strong>Permissions</strong><br><span style="color:var(--muted);font-size:12px;">Camera + microphone access for preview and level meter.</span></div></div>
        <div class="check-item" id="chk-quiet"><i class="fas fa-volume-off" style="margin-top:2px;color:var(--primary);"></i><div><strong>Environment</strong><br><span style="color:var(--muted);font-size:12px;">Quiet space helps scoring and speech capture.</span></div></div>
      </div>
      <div class="interview-container" style="margin-bottom:16px;">
        <div>
          <div class="camera-feed" style="max-width:100%;">
            <video id="preview-video" playsinline autoplay muted></video>
          </div>
          <div class="mic-meter-wrap"><div class="mic-meter-fill" id="mic-meter-fill"></div></div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px;">Microphone level</div>
        </div>
        <div class="proctoring-panel">
          <div style="font-size:12px;font-weight:700;margin-bottom:10px;text-transform:uppercase;color:var(--muted);">Controls</div>
          <div class="toolbar-row">
            <button type="button" class="btn btn-primary btn-sm" id="btn-req-perm" onclick="requestInterviewMedia()"><i class="fas fa-video"></i> Request access</button>
            <button type="button" class="btn btn-outline btn-sm" onclick="requestInterviewMedia()"><i class="fas fa-redo"></i> Retry</button>
          </div>
          <div class="toolbar-row">
            <button type="button" class="btn btn-outline btn-sm" id="btn-cam-toggle" onclick="toggleCamera()" disabled><i class="fas fa-camera"></i> Camera on</button>
            <button type="button" class="btn btn-outline btn-sm" id="btn-mic-mute" onclick="toggleVoiceMute()" disabled><i class="fas fa-microphone"></i> Mute input</button>
          </div>
          <p style="font-size:12px;color:var(--muted);margin-top:12px;">${attemptRole ? 'Role: <strong>' + escapeHtml(attemptRole) + '</strong>' : ''}</p>
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;">
        <button type="button" class="btn btn-grad" id="btn-begin-live" disabled onclick="beginLiveInterview()"><i class="fas fa-play"></i> Start Interview</button>
      </div>
    </div>`;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function cancelReadiness() {
  resetProctorSession();
  stopMicMeter();
  if (videoStream) {
    videoStream.getTracks().forEach(t => t.stop());
    videoStream = null;
  }
  proctorStats = { camera: false, microphone: false, headStraight: true };
  faceModelsLoaded = false;
  renderGate(gateStatus);
  loadPrev();
}

async function requestInterviewMedia() {
  stopMicMeter();
  if (videoStream) {
    videoStream.getTracks().forEach(t => t.stop());
    videoStream = null;
  }
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 360 }, facingMode: 'user' },
      audio: { echoCancellation: true, noiseSuppression: true }
    });
    const prev = document.getElementById('preview-video');
    if (prev) prev.srcObject = videoStream;
    proctorStats.camera = true;
    proctorStats.microphone = true;
    document.getElementById('chk-perm')?.classList.add('done');
    document.getElementById('btn-cam-toggle').disabled = false;
    document.getElementById('btn-mic-mute').disabled = false;
    document.getElementById('btn-begin-live').disabled = false;
    updateCamToggleLabel();
    startMicMeter(videoStream);
    toast('Camera and microphone ready.', 'success');
  } catch (e) {
    proctorStats.camera = false;
    proctorStats.microphone = false;
    toast('Could not access camera/microphone: ' + (e.message || 'denied'), 'error');
  }
}

function startMicMeter(stream) {
  const audioTracks = stream.getAudioTracks();
  if (!audioTracks.length) return;
  try {
    micAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = micAudioCtx.createMediaStreamSource(stream);
    micAnalyser = micAudioCtx.createAnalyser();
    micAnalyser.fftSize = 256;
    src.connect(micAnalyser);
    const data = new Uint8Array(micAnalyser.frequencyBinCount);
    const fill = document.getElementById('mic-meter-fill');
    const loop = () => {
      micRafId = requestAnimationFrame(loop);
      if (!micAnalyser || !fill) return;
      micAnalyser.getByteFrequencyData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i];
      const avg = sum / data.length;
      fill.style.width = Math.min(100, avg * 1.8) + '%';
    };
    loop();
  } catch (_) { /* meter optional */ }
}

function stopMicMeter() {
  if (micRafId) cancelAnimationFrame(micRafId);
  micRafId = null;
  if (micAudioCtx) try { micAudioCtx.close(); } catch (_) {}
  micAudioCtx = null;
  micAnalyser = null;
  const fill = document.getElementById('mic-meter-fill');
  if (fill) fill.style.width = '0%';
}

function toggleCamera() {
  if (proctorSessionActive && interviewSessionId && questions.length) {
    toast('Camera and live detection stay on until you finish the interview.', 'info');
    return;
  }
  if (!videoStream) return;
  const vt = videoStream.getVideoTracks()[0];
  if (!vt) return;
  cameraUserDisabled = !cameraUserDisabled;
  vt.enabled = !cameraUserDisabled;
  proctorStats.camera = vt.enabled;
  updateCamToggleLabel();
  if (document.getElementById('proctoring-status')) updateProctorUI();
}

function updateCamToggleLabel() {
  const b = document.getElementById('btn-cam-toggle');
  if (!b) return;
  b.innerHTML = cameraUserDisabled
    ? '<i class="fas fa-camera-slash"></i> Camera off'
    : '<i class="fas fa-camera"></i> Camera on';
}

function toggleVoiceMute() {
  voiceMuted = !voiceMuted;
  const b = document.getElementById('btn-mic-mute');
  if (b) {
    b.innerHTML = voiceMuted
      ? '<i class="fas fa-microphone-slash"></i> Unmute input'
      : '<i class="fas fa-microphone"></i> Mute input';
  }
  if (voiceMuted && isRecording) stopRecording();
  if (videoStream) {
    videoStream.getAudioTracks().forEach(t => { t.enabled = !voiceMuted; });
  }
}

async function beginLiveInterview() {
  stopMicMeter();
  resetProctorSession();
  const begin = await API.post('interview.php', 'begin_batch', {
    job_id: jobId || undefined,
    target_role: attemptRole
  });
  if (!begin.success) { toast(begin.message, 'error'); return; }
  interviewSessionId = begin.data.session_id;
  const params = { role: attemptRole };
  if (jobId) params.job_id = jobId;
  const res = await API.get('interview.php', 'questions', params);
  if (!res.success) { toast(res.message, 'error'); return; }
  questions = res.data.questions;
  answers = new Array(questions.length).fill('');
  answerStatuses = new Array(questions.length).fill('pending');
  currentQ = 0;
  headTurnWarnings = 0;
  badPoseStreak = goodPoseStreak = faceMissingStreak = 0;
  liveYaw = livePitch = 0;
  tabSwitchCount = 0;
  renderQuestion();
}

async function loadPrev() {
  const res = await API.get('interview.php', 'results');
  const results = res.data?.results || [];
  const el = document.getElementById('prev');
  if (!el) return;
  if (!results.length) { el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:16px;font-size:14px;">No answers yet.</div>'; return; }
  el.innerHTML = `<div class="tbl-wrap"><table><thead><tr><th>Date</th><th>Question</th><th>Rating</th><th>Score</th></tr></thead><tbody>
    ${results.map(r => `<tr>
      <td>${fmtDate(r.taken_at)}</td>
      <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(r.question)}</td>
      <td><span class="badge ${r.ai_rating === 'Strong' ? 'b-green' : r.ai_rating === 'Good' ? 'b-blue' : r.ai_rating === 'Average' ? 'b-yellow' : 'b-red'}">${r.ai_rating}</span></td>
      <td><strong>${r.ai_score}/10</strong></td>
    </tr>`).join('')}
  </tbody></table></div>`;
}

function stopHeadTracking() {
  headTrackGeneration++;
}

function loadFaceModelsOnce() {
  if (faceModelsLoaded) return Promise.resolve();
  
  return new Promise((resolve, reject) => {
    // Load MediaPipe scripts dynamically
    const scripts = [
      'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js',
      'https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js',
      'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js'
    ];
    
    let loaded = 0;
    const total = scripts.length;
    
    function onScriptLoad() {
      loaded++;
      if (loaded === total) {
        try {
          faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
          });
          
          faceMesh.setOptions({
            maxNumFaces: 4,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
          });
          
          faceMesh.onResults(onFaceMeshResults);
          faceModelsLoaded = true;
          console.log('MediaPipe FaceMesh initialized');
          resolve();
        } catch (e) {
          console.error('Failed to initialize MediaPipe:', e);
          faceModelsLoaded = false;
          reject(e);
        }
      }
    }
    
    function onScriptError(e) {
      console.error('Failed to load MediaPipe script:', e.target.src);
      faceModelsLoaded = false;
      reject(new Error('Failed to load MediaPipe scripts'));
    }
    
    scripts.forEach(url => {
      const script = document.createElement('script');
      script.src = url;
      script.onload = onScriptLoad;
      script.onerror = onScriptError;
      document.head.appendChild(script);
    });
  }).catch(e => {
    console.error('Failed to load face models:', e);
    faceModelsLoaded = false;
    throw e;
  });
}

let lastToastMs = 0;
function showProctorToast(msg, type) {
  const now = Date.now();
  if (now - lastToastMs > 3000) {
    toast(msg, type);
    lastToastMs = now;
  }
}

function onFaceMeshResults(results) {
  if (!results.multiFaceLandmarks) return;

  const faceCount = results.multiFaceLandmarks.length;
  faceDetectionState.faceCount = faceCount;

  if (faceCount > 1) {
    // ── Multiple faces ──────────────────────────────────────────
    faceMissingStreak = 0;
    badPoseStreak = 0;
    goodPoseStreak = 0;
    faceDetectionState.multipleFaces = true;
    faceDetectionState.faceNotDetected = false;
    faceDetectionState.headStraight = true; // head pose irrelevant when multiple faces
    proctorStats.headStraight = true;
    headTurnWarnings++;
    showProctorToast('Warning: Multiple faces detected!', 'error');
    maybeRefreshProctorUi(true);

  } else if (faceCount === 1) {
    // ── Exactly one face ────────────────────────────────────────
    faceDetectionState.multipleFaces = false;
    faceDetectionState.faceNotDetected = false;
    faceMissingStreak = 0;

    const landmarks = results.multiFaceLandmarks[0];
    const pose = getHeadPoseFromLandmarks(landmarks);
    liveYaw = pose.yaw;
    livePitch = pose.pitch;

    const yawBad  = Math.abs(pose.yaw)   > 28;
    const pitchBad = Math.abs(pose.pitch) > 22;
    const lookingAway = yawBad || pitchBad;

    if (lookingAway) {
      badPoseStreak++;
      goodPoseStreak = 0;
      faceDetectionState.headStraight = false;
      proctorStats.headStraight = false;
      if (badPoseStreak >= 4) {
        headTurnWarnings++;
        badPoseStreak = 0;
        showProctorToast('Warning: Please look at the camera', 'warning');
        maybeRefreshProctorUi(true);
      } else {
        maybeRefreshProctorUi(false);
      }
    } else {
      goodPoseStreak++;
      badPoseStreak = 0;
      faceDetectionState.headStraight = true;
      proctorStats.headStraight = true;
      maybeRefreshProctorUi(false);
    }

  } else {
    // ── No face detected ────────────────────────────────────────
    faceDetectionState.multipleFaces = false;
    faceDetectionState.headStraight = true; // no face = no pose data
    proctorStats.headStraight = true;
    badPoseStreak = 0;
    goodPoseStreak = 0;
    faceMissingStreak++;
    faceDetectionState.faceNotDetected = true;
    if (faceMissingStreak >= 3) {
      headTurnWarnings++;
      faceMissingStreak = 0;
      showProctorToast('Warning: Face not detected. Please move into frame.', 'error');
      maybeRefreshProctorUi(true);
    } else {
      maybeRefreshProctorUi(false);
    }
  }
}

function waitVideoReady(video) {
  return new Promise((resolve) => {
    let settled = false;
    const finish = () => {
      if (settled) return;
      settled = true;
      video.removeEventListener('loadeddata', onEvt);
      video.removeEventListener('playing', onEvt);
      resolve();
    };
    const onEvt = () => {
      if (video.videoWidth > 2 && video.readyState >= 2) finish();
    };
    if (video.videoWidth > 2 && video.readyState >= 2) return resolve();
    video.addEventListener('loadeddata', onEvt);
    video.addEventListener('playing', onEvt);
    video.play().catch(() => {});
    setTimeout(finish, 5000);
  });
}

function drawProctorOverlay(video, face, faceCount) {
  const canvas = document.getElementById('canvas-proctoring');
  if (!canvas || !video) return;
  const w = video.clientWidth | 0;
  const h = video.clientHeight | 0;
  if (w < 2 || h < 2) return;
  const vw = video.videoWidth || w;
  const vh = video.videoHeight || h;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  if (!face) return;
  const box = face.detection.box;
  const sx = w / vw;
  const sy = h / vh;
  const straight = proctorStats.headStraight;
  const color = faceCount > 1 ? '#FF5252' : (straight ? '#43A047' : '#FB8C00');
  const fillColor = faceCount > 1 ? 'rgba(255, 82, 82, 0.15)' : (straight ? 'rgba(67,160,71,0.12)' : 'rgba(251,140,0,0.15)');
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.strokeRect(box.x * sx, box.y * sy, box.width * sx, box.height * sy);
  ctx.fillStyle = fillColor;
  ctx.fillRect(box.x * sx, box.y * sy, box.width * sx, box.height * sy);
}

function getHeadPoseFromLandmarks(landmarks) {
  // MediaPipe format: array of {x, y, z}
  let nose, lex = 0, ley = 0, rex = 0, rey = 0;
  
  if (Array.isArray(landmarks)) {
    nose = landmarks[1]; // nose tip
    // Left eye center
    const leftEyeIndices = [33, 160, 158, 133, 153, 144];
    for (const idx of leftEyeIndices) {
      if (landmarks[idx]) { lex += landmarks[idx].x; ley += landmarks[idx].y; }
    }
    lex /= leftEyeIndices.length;
    ley /= leftEyeIndices.length;
    
    // Right eye center
    const rightEyeIndices = [263, 387, 385, 362, 380, 373];
    for (const idx of rightEyeIndices) {
      if (landmarks[idx]) { rex += landmarks[idx].x; rey += landmarks[idx].y; }
    }
    rex /= rightEyeIndices.length;
    rey /= rightEyeIndices.length;
  } else if (landmarks.getNose) {
    // face-api format
    nose = landmarks.getNose()[3];
    const le = landmarks.getLeftEye();
    const re = landmarks.getRightEye();
    for (let i = 0; i < le.length; i++) { lex += le[i].x; ley += le[i].y; }
    for (let i = 0; i < re.length; i++) { rex += re[i].x; rey += re[i].y; }
    lex /= le.length; ley /= le.length; rex /= re.length; rey /= re.length;
  }
  
  const eyeCx = (lex + rex) / 2;
  const eyeCy = (ley + rey) / 2;
  const ied = Math.hypot(rex - lex, rey - ley) || 1;
  const yaw = ((nose.x - eyeCx) / ied) * 58;
  const pitch = ((nose.y - eyeCy) / ied) * 52 - 6;
  return { yaw, pitch };
}

function maybeRefreshProctorUi(force) {
  const now = Date.now();
  if (!force && now - lastProctorUiMs < 180) return;
  lastProctorUiMs = now;
  updateProctorUI();
}

async function attachInterviewCamera() {
  const videoEl = document.getElementById('video');
  if (!videoEl) return;

  if (videoStream) {
    videoEl.srcObject = videoStream;
    const vt = videoStream.getVideoTracks()[0];
    proctorStats.camera = !!(vt && vt.enabled);
  } else {
    try {
      videoStream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 640 }, height: { ideal: 360 }, facingMode: 'user' },
        audio: false
      });
      videoEl.srcObject = videoStream;
      proctorStats.camera = true;
    } catch (e) {
      toast('Camera unavailable — proctoring limited.', 'warning');
      proctorStats.camera = false;
    }
  }

  if (!proctorStats.camera) {
    faceModelsLoaded = false;
    updateProctorUI();
    return;
  }

  try {
    await loadFaceModelsOnce();
    faceModelsLoaded = true;
  } catch (e) {
    console.error(e);
    faceModelsLoaded = false;
    toast('Could not load face-detection models (network?).', 'warning');
    updateProctorUI();
    return;
  }

  await waitVideoReady(videoEl);
  if (!proctorSessionActive) {
    proctorSessionActive = true;
    headTrackGeneration++;
    startHeadTrackingLoop(headTrackGeneration);
  } else {
    try { await videoEl.play(); } catch (_) {}
  }
  updateProctorUI();
}

function startHeadTrackingLoop(gen) {
  if (!faceModelsLoaded || !proctorStats.camera) return;
  const video = document.getElementById('video');
  if (!video) return;
  
  try {
    if (camera) camera.stop();
    camera = new Camera(video, {
      onFrame: async () => {
        if (gen === headTrackGeneration && faceMesh) {
          await faceMesh.send({image: video});
        }
      },
      width: 640,
      height: 480
    });
    camera.start();
  } catch (err) {
    console.error('Head tracking setup error:', err);
  }
}

function updateProctorUI() {
  const el = document.getElementById('proctoring-status');
  if (!el) return;

  // Each warning type is independent — all can show simultaneously
  let warningHtml = '';

  if (!proctorStats.camera) {
    warningHtml += '<div style="font-size:12px;color:#FF5252;padding:5px 0;"><i class="fas fa-camera-slash" style="margin-right:5px;"></i>Camera disabled</div>';
  }

  if (!proctorStats.microphone) {
    warningHtml += '<div style="font-size:12px;color:#FF5252;padding:5px 0;"><i class="fas fa-microphone-slash" style="margin-right:5px;"></i>Microphone permission denied</div>';
  }

  if (proctorSessionActive && faceDetectionState.faceCount === 0) {
    warningHtml += '<div style="font-size:12px;color:#FF5252;padding:5px 0;"><i class="fas fa-user-slash" style="margin-right:5px;"></i>Face not detected — move into frame</div>';
  }

  if (proctorSessionActive && faceDetectionState.multipleFaces) {
    warningHtml += '<div style="font-size:12px;color:#FF5252;padding:5px 0;"><i class="fas fa-users" style="margin-right:5px;"></i>Multiple faces detected</div>';
  }

  if (proctorSessionActive && !faceDetectionState.headStraight && !faceDetectionState.multipleFaces && faceDetectionState.faceCount === 1) {
    warningHtml += '<div style="font-size:12px;color:#FF9800;padding:5px 0;"><i class="fas fa-eye" style="margin-right:5px;"></i>Please look at the camera</div>';
  }

  el.innerHTML = warningHtml || (proctorSessionActive
    ? '<div style="font-size:12px;color:var(--muted);padding:6px 0;"><i class="fas fa-check-circle" style="color:var(--success);margin-right:4px;"></i>All clear</div>'
    : '');
}



function renderQuestion() {
  if (currentQ >= questions.length) { submitAll(); return; }
  const q = questions[currentQ];
  const pct = (currentQ / questions.length) * 100;
  const st = answerStatuses[currentQ] || 'pending';
  const stClass = st === 'answered' ? 'answered' : st === 'skipped' ? 'skipped' : '';
  const stLabel = st === 'answered' ? 'Answered' : st === 'skipped' ? 'Skipped' : 'In progress';

  document.getElementById('wrap').innerHTML = `
    <div class="card fade-in">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
        <div>
          <h2 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin:0;">🎤 Live practice</h2>
          <div style="font-size:13px;color:var(--muted);">Question ${currentQ + 1} of ${questions.length} · ${escapeHtml(attemptRole)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span class="ans-status ${stClass}" id="ans-status">${stLabel}</span>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
        <div class="prog-wrap" style="flex:1;min-width:120px;margin:0;"><div class="prog-bar" style="width:${pct}%"></div></div>
        <button type="button" class="btn btn-ghost btn-sm" onclick="confirmStopInterview()"><i class="fas fa-stop"></i> Stop</button>
      </div>

      <div class="interview-container" style="margin-bottom:20px;">
        <div>
          <div class="iq" style="margin-bottom:16px;">${escapeHtml(q)}</div>
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
            <button type="button" class="btn btn-ghost btn-sm" data-q="${encodeURIComponent(q)}" onclick="speakQuestionFromBtn(this)">
              <i class="fas fa-volume-up"></i> Read aloud
            </button>
            <button type="button" class="btn btn-outline btn-sm" onclick="toggleVoiceMute()"><i class="fas fa-microphone"></i> Input</button>
          </div>
        </div>
        <div>
          <div class="camera-feed">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas-proctoring"></canvas>
          </div>
          <div id="proctoring-status"></div>
        </div>
      </div>

      <div class="ai-hr-chat" id="ai-hr-message" style="display:none;"></div>

      <div style="background:var(--bg);border-radius:var(--r);padding:20px;margin-bottom:16px;">
        <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px;">
          <button type="button" class="voice-btn voice-idle" id="vbtn" onclick="toggleVoice()" title="Record">
            <i class="fas fa-microphone" id="vicon"></i>
          </button>
          <div>
            <div style="font-weight:600;font-size:14px;" id="vstatus">Tap mic to dictate</div>
            <div style="font-size:12px;color:var(--muted);">Or type below</div>
          </div>
        </div>
        <div id="live-transcript" style="font-size:13px;color:var(--primary);text-align:center;min-height:20px;font-style:italic;"></div>
      </div>

      <div class="fg">
        <label class="label">Your answer</label>
        <textarea class="textarea" id="ans" placeholder="Speak or type using STAR..." style="min-height:120px;" oninput="onAnsInput()"></textarea>
        <div style="display:flex;justify-content:space-between;margin-top:4px;">
          <span class="hint">STAR: situation → task → action → result</span>
          <span id="wc" style="font-size:12px;color:var(--muted);">0 words</span>
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-top:8px;">
        <div style="display:flex;gap:10px;">
          ${currentQ > 0 ? `<button type="button" class="btn btn-ghost" onclick="prevQ()"><i class="fas fa-arrow-left"></i> Back</button>` : ''}
          <button type="button" class="btn btn-outline btn-sm" onclick="clearAns()"><i class="fas fa-eraser"></i> Clear</button>
        </div>
        <div style="display:flex;gap:10px;">
          <button type="button" class="btn btn-ghost" onclick="skipQ()">Skip <i class="fas fa-forward"></i></button>
          <button type="button" class="btn btn-grad" id="nextbtn" onclick="nextQ()">
            ${currentQ === questions.length - 1 ? '<i class="fas fa-paper-plane"></i> Finish' : 'Next <i class="fas fa-arrow-right"></i>'}
          </button>
        </div>
      </div>
      ${headTurnWarnings > 0 ? `<div class="warning-msg"><i class="fas fa-exclamation-triangle"></i> <strong>${headTurnWarnings}</strong> head-position flags — face the camera when possible.</div>` : ''}

function speakQuestionFromBtn(btn) {
  const t = decodeURIComponent(btn.getAttribute('data-q') || '');
  speakQuestion(t);
}

function confirmStopInterview() {
  if (!confirm('Stop this interview? Progress on unfinished questions may be submitted early.')) return;
  submitAll();
}

function onAnsInput() {
  const txt = document.getElementById('ans')?.value?.trim() || '';
  if (txt.length >= 10 && answerStatuses[currentQ] === 'pending') {
    answerStatuses[currentQ] = 'answered';
    const st = document.getElementById('ans-status');
    if (st) { st.textContent = 'Answered'; st.className = 'ans-status answered'; }
  }
  updateWC();
}

function fetchAIHRMessage(q) {
  const el = document.getElementById('ai-hr-message');
  if (!el) return;
  el.style.display = 'block';
  el.innerHTML = '<strong>Coach:</strong> Outline STAR in one line mentally, then expand. Aim for 120–220 words.';
}

function updateWC() {
  const txt = document.getElementById('ans')?.value || '';
  const words = txt.trim().split(/\s+/).filter(Boolean).length;
  const el = document.getElementById('wc');
  if (el) {
    el.textContent = words + ' words';
    el.style.color = words >= 50 ? 'var(--success)' : words >= 20 ? '#F57F17' : 'var(--muted)';
  }
}

function speakQuestion(text) {
  if (!synth) return;
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.9; utt.pitch = 1; utt.lang = 'en-IN';
  const voices = synth.getVoices();
  const preferred = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female'))
    || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utt.voice = preferred;
  synth.speak(utt);
}

function setupVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById('vbtn');
  const status = document.getElementById('vstatus');
  if (!SR) {
    if (btn) { btn.disabled = true; btn.title = 'Not supported'; }
    if (status) status.textContent = 'Voice not supported — type your answer';
    return;
  }
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-IN';

  let finalText = document.getElementById('ans')?.value || '';

  recognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
      else interim = e.results[i][0].transcript;
    }
    const ans = document.getElementById('ans');
    if (ans) ans.value = finalText + interim;
    const lt = document.getElementById('live-transcript');
    if (lt) lt.textContent = interim ? '"' + interim + '"' : '';
    onAnsInput();
  };
  recognition.onerror = e => { toast('Voice: ' + e.error, 'warning'); stopRecording(); };
  recognition.onend = () => { if (isRecording) stopRecording(); };
}

function toggleVoice() { isRecording ? stopRecording() : startRecording(); }

function startRecording() {
  if (voiceMuted) { toast('Unmute input to use voice dictation.', 'info'); return; }
  if (!recognition) return;
  synth.cancel();
  isRecording = true;
  try { recognition.start(); } catch (_) { /* already started */ }
  const btn = document.getElementById('vbtn'), icon = document.getElementById('vicon'), status = document.getElementById('vstatus');
  if (btn) btn.className = 'voice-btn voice-rec';
  if (icon) icon.className = 'fas fa-stop';
  if (status) status.textContent = 'Recording… tap to stop';
}

function stopRecording() {
  isRecording = false;
  if (recognition) try { recognition.stop(); } catch (_) {}
  const btn = document.getElementById('vbtn'), icon = document.getElementById('vicon'), status = document.getElementById('vstatus'), lt = document.getElementById('live-transcript');
  if (btn) btn.className = 'voice-btn voice-idle';
  if (icon) icon.className = 'fas fa-microphone';
  if (status) status.textContent = 'Tap mic to dictate';
  if (lt) lt.textContent = '';
}

function saveCurrentAns() {
  answers[currentQ] = document.getElementById('ans')?.value?.trim() || '';
  if (isRecording) stopRecording();
  synth.cancel();
  const words = answers[currentQ].split(/\s+/).filter(Boolean).length;
  if (answerStatuses[currentQ] === 'pending') {
    if (words >= 10) answerStatuses[currentQ] = 'answered';
  }
}

function nextQ() {
  saveCurrentAns();
  if (currentQ < questions.length - 1) { currentQ++; renderQuestion(); }
  else submitAll();
}

function prevQ() {
  saveCurrentAns();
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

function skipQ() {
  answers[currentQ] = '';
  answerStatuses[currentQ] = 'skipped';
  if (isRecording) stopRecording();
  synth.cancel();
  const st = document.getElementById('ans-status');
  if (st) { st.textContent = 'Skipped'; st.className = 'ans-status skipped'; }
  if (currentQ < questions.length - 1) { currentQ++; renderQuestion(); }
  else submitAll();
}

function clearAns() {
  const a = document.getElementById('ans');
  if (a) a.value = '';
  answerStatuses[currentQ] = 'pending';
  updateWC();
}

async function submitAll() {
  if (isRecording) stopRecording();
  synth.cancel();
  stopHeadTracking();
  proctorSessionActive = false;

  if (!interviewSessionId) {
    toast('Session missing — reload and use Set up & start.', 'error');
    return;
  }

  document.getElementById('wrap').innerHTML = `
    <div class="card" style="text-align:center;padding:60px;">
      <div style="font-size:52px;margin-bottom:16px;">🤖</div>
      <h2 style="font-family:'Syne',sans-serif;font-size:24px;font-weight:700;margin-bottom:8px;">Evaluating…</h2>
      <p style="color:var(--muted);margin-bottom:24px;">Gemini is scoring each answer (may take 20–40s).</p>
      <div style="display:flex;justify-content:center;gap:8px;">
        ${[0, 200, 400].map(d => `<div style="width:10px;height:10px;border-radius:50%;background:var(--primary);animation:pulse ${1.4}s ${d}ms infinite;"></div>`).join('')}
      </div>
    </div>`;

  const feedbacks = [];
  let totalWeighted = 0;
  let skippedN = 0;

  for (let i = 0; i < questions.length; i++) {
    const raw = answers[i] || '';
    const skipped = answerStatuses[i] === 'skipped' || raw.length < 5;
    if (skipped) skippedN++;
    const res = await API.post('interview.php', 'evaluate', {
      session_id: interviewSessionId,
      question: questions[i],
      answer: raw || (skipped ? '' : raw),
      skipped: skipped,
      job_id: jobId,
      head_violations: headTurnWarnings,
      tab_switches: tabSwitchCount,
      interview_type: 'standard'
    });
    if (res.success) {
      feedbacks.push({ question: questions[i], answer: raw, status: answerStatuses[i], fb: res.data });
      totalWeighted += (res.data.weighted_score ?? (res.data.score ?? 0) * 10);
    } else {
      console.error('[Interview] evaluate failed:', res.message);
      const errScore = skipped ? 0 : 0; // API failure = 0 contribution; don't guess
      feedbacks.push({ question: questions[i], answer: raw, status: answerStatuses[i],
        fb: {
          rating: skipped ? 'Weak' : 'Poor',
          weighted_score: errScore,
          score: 0,
          feedback: res.message || 'Could not evaluate this answer.',
          strengths: [],
          improvements: skipped ? ['Question was skipped — no response given'] : ['Evaluation failed — please retry'],
          suggestions: skipped ? 'Attempt every question even partially; any structured answer scores better than skipping.' : ''
        }
      });
      totalWeighted += errScore;
    }
  }

  const avgWeighted = Math.round(totalWeighted / questions.length);
  await API.post('interview.php', 'complete_session', {
    session_id: interviewSessionId,
    avg_ai_score: totalWeighted / questions.length / 10, // store as 0-10 for DB compat
    questions_count: questions.length,
    summary: { skipped: skippedN, tab_switches: tabSwitchCount, head_warnings: headTurnWarnings }
  });

  stopMicMeter();
  renderFeedback(feedbacks, avgWeighted);
}

function renderFeedback(feedbacks, avgWeighted) {
  // avgWeighted is 0-100
  const rColors = {
    Excellent: 'var(--success)', Good: '#2196F3',
    Average: '#F57F17',         Weak: 'var(--danger)',
    Poor: '#880E4F',
    // legacy compat
    Strong: 'var(--success)'
  };
  const rIcons = { Excellent:'🌟', Good:'👍', Average:'😐', Weak:'⚠️', Poor:'❌', Strong:'🌟' };

  const sessionLabel = avgWeighted >= 85 ? 'Excellent' : avgWeighted >= 70 ? 'Good' : avgWeighted >= 50 ? 'Average' : 'Needs work';
  const sessionIcon  = avgWeighted >= 85 ? '🌟' : avgWeighted >= 70 ? '👍' : '💪';

  let html = `<div class="card fade-in" style="margin-bottom:24px;">
    <div style="text-align:center;padding:20px 0;">
      <div style="font-size:52px;margin-bottom:12px;">${sessionIcon}</div>
      <h2 style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:4px;">Session complete</h2>
      <p style="color:var(--muted);margin-bottom:20px;">${feedbacks.length} answers · saved to your profile</p>
      ${scoreRing(avgWeighted, 140)}
      <div style="margin:12px 0 4px;font-size:15px;font-weight:700;color:${avgWeighted>=70?'var(--success)':avgWeighted>=50?'#F57F17':'var(--danger)'}">${sessionLabel}</div>
      <p style="margin:8px 0 20px;font-size:13px;color:var(--muted);">Job fit interview component and <strong>career readiness</strong> updated.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <a href="user-dashboard.html" class="btn btn-primary"><i class="fas fa-home"></i> Dashboard</a>
        <a href="test.html" class="btn btn-outline"><i class="fas fa-clipboard-list"></i> Aptitude</a>
        <button type="button" class="btn btn-ghost" onclick="location.reload()"><i class="fas fa-redo"></i> Again</button>
      </div>
    </div>
  </div>`;

  feedbacks.forEach((item, i) => {
    const fb = item.fb;
    const ws = fb.weighted_score ?? (fb.score ?? 0) * 10;
    const rc = rColors[fb.rating] || '#666';
    const badge = item.status === 'skipped' ? '<span class="badge b-yellow">Skipped</span>' : '';

    // 5-parameter breakdown bars
    const params = [
      { label: 'Communication',  key: 'clarity',         weight: 20, color: '#2196F3' },
      { label: 'Technical',      key: 'technical',       weight: 30, color: 'var(--primary)' },
      { label: 'Confidence',     key: 'confidence',      weight: 20, color: '#9C27B0' },
      { label: 'Relevance',      key: 'relevance',       weight: 20, color: 'var(--success)' },
      { label: 'Professionalism',key: 'professionalism', weight: 10, color: '#FF9800' },
    ];
    const hasBreakdown = fb.clarity != null || fb.technical != null;
    const breakdownHtml = hasBreakdown ? `
      <div style="margin-bottom:14px;">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:8px;letter-spacing:0.05em;">Score Breakdown</div>
        ${params.map(p => {
          const val = fb[p.key] ?? 0;
          const pct = Math.min(100, val * 10);
          return `<div style="margin-bottom:7px;">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;">
              <span style="color:var(--muted);">${p.label} <span style="font-size:10px;opacity:0.6;">(${p.weight}%)</span></span>
              <strong style="color:${p.color};">${val}/10</strong>
            </div>
            <div class="prog-wrap" style="height:6px;">
              <div class="prog-bar" style="width:${pct}%;background:${p.color};height:6px;"></div>
            </div>
          </div>`;
        }).join('')}
      </div>` : '';

    html += `<div class="card fade-in" style="margin-bottom:20px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:10px;">Question ${i + 1} ${badge}</div>
      <div class="iq" style="margin-bottom:14px;">${escapeHtml(item.question)}</div>
      ${item.answer ? `<div style="background:var(--bg);padding:12px;border-radius:var(--r-sm);margin-bottom:14px;font-size:14px;color:var(--muted);border-left:3px solid var(--border);">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:4px;">Your answer</div>
        "${escapeHtml(item.answer.slice(0, 400))}${item.answer.length > 400 ? '…' : ''}"
      </div>` : `<div class="alert a-warning" style="margin-bottom:14px;"><i class="fas fa-forward"></i> No answer</div>`}
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:14px;flex-wrap:wrap;">
        <div style="font-size:18px;font-weight:700;color:${rc};">${rIcons[fb.rating] || '📝'} ${fb.rating}</div>
        <div style="font-size:14px;font-weight:700;">Score: <span style="color:${rc};">${ws}/100</span></div>
        <div style="flex:1;min-width:150px;"><div class="prog-wrap"><div class="prog-bar" style="width:${ws}%;background:${rc};"></div></div></div>
      </div>
      ${breakdownHtml}
      <div style="font-size:14px;color:var(--muted);margin-bottom:12px;line-height:1.6;">${escapeHtml(fb.feedback || '')}</div>
      ${fb.strengths?.length ? `<div style="margin-bottom:10px;"><div style="font-size:12px;font-weight:700;color:var(--success);margin-bottom:6px;">Strengths</div>${fb.strengths.map(s => '<div style="font-size:13px;color:var(--muted);padding:2px 0;">• ' + escapeHtml(s) + '</div>').join('')}</div>` : ''}
      ${fb.improvements?.length ? `<div style="margin-bottom:10px;"><div style="font-size:12px;font-weight:700;color:var(--danger);margin-bottom:6px;">Improve</div>${fb.improvements.map(s => '<div style="font-size:13px;color:var(--muted);padding:2px 0;">• ' + escapeHtml(s) + '</div>').join('')}</div>` : ''}
      ${fb.suggestions ? `<div style="background:#FFF8E1;border:1px solid #FFE082;border-radius:var(--r-sm);padding:14px;font-size:13px;color:#5D4037;line-height:1.6;"><i class="fas fa-lightbulb" style="color:#F57F17;margin-right:6px;"></i><strong>Suggestion:</strong> ${escapeHtml(fb.suggestions)}</div>` : ''}
    </div>`;
  });

  document.getElementById('wrap').innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
  <script src="/trueocc/frontend/js/pwa.js"></script>
</body></html>
